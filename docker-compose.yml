services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: travel_journal
      POSTGRES_PASSWORD: travel_journal
      POSTGRES_DB: travel_journal_dev
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_journal -d travel_journal_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - travel_journal_dev_data:/var/lib/postgresql/data

  api:
    image: golang:1.25-bookworm
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://travel_journal:travel_journal@postgres:5432/travel_journal_dev?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "go run ./cmd/e2e-db-prep && exec go run ./cmd/server"

  frontend:
    image: node:20-bookworm
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://api:8080
    depends_on:
      - api
    command: >
      sh -c "npm ci && exec npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  travel_journal_dev_data:
  frontend_node_modules:
