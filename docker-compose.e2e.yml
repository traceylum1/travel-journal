version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: travel-journal-e2e-db
    environment:
      POSTGRES_USER: travel_journal
      POSTGRES_PASSWORD: travel_journal
      POSTGRES_DB: travel_journal_e2e
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_journal -d travel_journal_e2e"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - travel_journal_e2e_data:/var/lib/postgresql/data

volumes:
  travel_journal_e2e_data:
